<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Todo Page</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-dark: #115e59;
        --line: #e5e7eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, #d1fae5 0%, transparent 45%),
          radial-gradient(circle at bottom left, #e0f2fe 0%, transparent 45%),
          var(--bg);
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .todo-card {
        width: min(700px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(31, 41, 55, 0.08);
        padding: 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.9rem;
      }

      .subtitle {
        margin: 0 0 18px;
        color: var(--muted);
      }

      .form-row {
        display: flex;
        gap: 10px;
      }

      #taskInput {
        flex: 1;
        padding: 11px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        font-size: 1rem;
      }

      #taskInput:focus {
        outline: 2px solid #99f6e4;
        border-color: var(--accent);
      }

      button {
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.95rem;
      }

      #addBtn {
        background: var(--accent);
        color: white;
        padding: 11px 16px;
        font-weight: 700;
      }

      #addBtn:hover {
        background: var(--accent-dark);
      }

      .list-wrap {
        margin-top: 18px;
      }

      #todoList {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .todo-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 10px;
        background: #fbfdff;
      }

      .todo-text {
        flex: 1;
      }

      .todo-check {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .todo-item.completed .todo-text {
        text-decoration: line-through;
        color: var(--muted);
      }

      .edit-btn {
        background: #e0f2fe;
        color: #1e3a8a;
        padding: 7px 11px;
      }

      .edit-btn:hover {
        background: #bae6fd;
      }

      .delete-btn {
        background: #fee2e2;
        color: #991b1b;
        padding: 7px 11px;
      }

      .delete-btn:hover {
        background: #fecaca;
      }

      .empty-text {
        color: var(--muted);
        margin: 6px 0 0;
      }
    </style>
  </head>
  <body>
    <main class="todo-card">
      <h1>My To-Do List</h1>
      <p class="subtitle">
        Add tasks, check a task when done, and delete when finished.
      </p>

      <div class="form-row">
        <input
          id="taskInput"
          type="text"
          placeholder="What do you need to do?"
        />
        <button id="addBtn" type="button">Add</button>
      </div>

      <section class="list-wrap">
        <ul id="todoList"></ul>
        <p id="emptyText" class="empty-text">No tasks yet. Add one above.</p>
      </section>
    </main>

    <script>
      const taskInput = document.getElementById("taskInput");
      const addBtn = document.getElementById("addBtn");
      const todoList = document.getElementById("todoList");
      const emptyText = document.getElementById("emptyText");

      function toggleEmptyMessage() {
        emptyText.style.display =
          todoList.children.length === 0 ? "block" : "none";
      }

      function addTask() {
        const taskText = taskInput.value.trim();
        if (!taskText) return;

        const listItem = document.createElement("li");
        listItem.className = "todo-item";

        const checkBox = document.createElement("input");
        checkBox.className = "todo-check";
        checkBox.type = "checkbox";
        checkBox.addEventListener("change", () => {
          listItem.classList.toggle("completed", checkBox.checked);
        });

        const taskSpan = document.createElement("span");
        taskSpan.className = "todo-text";
        taskSpan.textContent = taskText;

        const editBtn = document.createElement("button");
        editBtn.className = "edit-btn";
        editBtn.type = "button";
        editBtn.textContent = "Edit";
        editBtn.addEventListener("click", () => {
          const updatedText = prompt("Edit your task:", taskSpan.textContent);
          if (updatedText === null) return;

          const trimmedText = updatedText.trim();
          if (!trimmedText) return;

          taskSpan.textContent = trimmedText;
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.type = "button";
        deleteBtn.textContent = "Delete";
        deleteBtn.addEventListener("click", () => {
          listItem.remove();
          toggleEmptyMessage();
        });

        listItem.append(checkBox, taskSpan, editBtn, deleteBtn);
        todoList.appendChild(listItem);
        taskInput.value = "";
        taskInput.focus();
        toggleEmptyMessage();
      }

      addBtn.addEventListener("click", addTask);
      taskInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          addTask();
        }
      });

      toggleEmptyMessage();
    </script>
  </body>
</html>
