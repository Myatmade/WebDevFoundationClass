<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traversal</title>
  </head>
  <body>
    <h1 class="heading">lorem</h1>
    <div id="div1">Hello</div>
    <h1 id="second-heading">second heading</h1>
    <button id="remove-btn">Remove second heading</button>
    <div>
      <p id="para">Lorem ipsum dolor sit amet.</p>
    </div>
    <script>
      let firstHeading = document.querySelector(".heading");
      let secondHeading = document.getElementById("second-heading");
      let para = document.querySelector("#para");
      let removeBtn = document.getElementById("remove-btn");
      //traversal in DOM

      //childNOdes, children, parentElement, parentNode, nextElemenntSibling, previousElementSibling
      console.log(
        para.parentElement.previousElementSibling.previousElementSibling
          .previousElementSibling,
      );

      //Event listener
      removeBtn.addEventListener("click", function () {
        secondHeading.remove();
        firstHeading.style.color = "red";
      });
    </script>
  </body>
</html>
